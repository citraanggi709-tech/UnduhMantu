<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Digital - Kontak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">NikahDigital</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Beranda</a></li>
                    <li class="nav-item"><a class="nav-link" href="tentang.html">Tentang</a></li>
                    <li class="nav-item"><a class="nav-link" href="katalog.html">Katalog</a></li>
                    <li class="nav-item"><a class="nav-link" href="bayar.html">Bayar</a></li>
                    <li class="nav-item"><a class="nav-link active fw-bold" href="kontak.html">Kontak</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card p-4 shadow-sm border-0">
                        <h2 class="fw-bold mb-3 text-center">Hubungi Kami</h2>
                        <p class="text-muted text-center mb-4">Punya pertanyaan seputar pembuatan undangan? Kirim pesan langsung kepada tim CS kami.</p>
                        
                        <form id="formKontak" onsubmit="kirimPesan(event)">
                            <div class="mb-3">
                                <label class="form-label">Nama Lengkap</label>
                                <input type="text" class="form-control" required id="nama">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Alamat Email</label>
                                <input type="email" class="form-control" required id="email">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Isi Pesan</label>
                                <textarea class="form-control" rows="5" required id="pesan"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Kirim Pesan</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">&copy; 2026 NikahDigital. All Rights Reserved.</p>
    </footer>

    <script>
        function kirimPesan(event) {
            event.preventDefault(); // Mencegah reload halaman otomatis
            let nama = document.getElementById('nama').value;
            alert('Halo ' + nama + ', pesan Anda berhasil terkirim! Tim kami akan menghubungi Anda sesaat lagi.');
            document.getElementById('formKontak').reset(); // Reset form
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
